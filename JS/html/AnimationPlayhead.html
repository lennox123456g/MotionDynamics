<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            padding-left: 2rem;
            padding-top: 2rem;
        }
        .square {
            width: 100px;
            height: 100px;
            background: hotpink;
        }
        .controls {
            margin-top: 150px;
            display: flex;
            gap: 1rem;
        }
        button {
            font-size: 1.5rem;
            padding:0.5rem 1rem;
            background: #c7c7c7;
            
        }
        p {
            margin-top: 1rem;
        }
    </style>
<body>
    <div class="wrapper "  >
        <div class="square " >
    </div>
    <div class="controls">
        <button id="pause">Pause</button>
        <button id="play">play</button>
        <button id="reverse">Reverse</button>
        <input value="0" min="0" max="1" id="slider" step="0.01" type="range">
    </div>

    <p> The current progress oF the Animation IS <span id="progress"></span></p>
       

    <script src="../../JS/AnimationPlayhead.js"></script>
</body>
</html>
