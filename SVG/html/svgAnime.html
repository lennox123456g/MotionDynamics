<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trendline Animation</title>
    <link rel="stylesheet" href="../css/svgAnime.css">
</head>
<body>

    <div class="container">

        <svg class="trendline" width="500" height="200" viewBox="0 0 500 220" width="100%">
            <polyline
                    points="0,175  60,130  120,160  180,90  230,130  280,60  340,110  400,155  460,185  500,170"
                    fill="none"
                    stroke="#111"
                    stroke-width="3"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                />
        </svg>
    </div>

</body>
</html>
